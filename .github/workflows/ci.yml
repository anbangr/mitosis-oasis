name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Python CI (pytest with system deps) ────────────────────────────────────
  python-ci:
    uses: anbangr/mitosis-cicd/.github/workflows/_reusable-python-ci.yml@main
    with:
      python-versions: '["3.10"]'
      apt-packages: "libcairo2-dev pkg-config libigraph-dev"
      install-command: 'pip install -e .'
      run-ruff: false
      pytest-markers: ""
      run-coverage: false

  # ── Docker build + push to GHCR ───────────────────────────────────────────
  docker:
    needs: [python-ci]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    uses: anbangr/mitosis-cicd/.github/workflows/_reusable-docker-ghcr.yml@main
    with:
      image-name: ghcr.io/anbangr/mitosis-oasis

  # ── Deploy to droplet ──────────────────────────────────────────────────────
  deploy:
    needs: [docker]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    uses: anbangr/mitosis-cicd/.github/workflows/_reusable-deploy-ssh.yml@main
    with:
      image-name: ghcr.io/anbangr/mitosis-oasis
      deploy-script: |
        mkdir -p /root/mitosis-oasis
        cd /root/mitosis-oasis
        cat > docker-compose.yml << 'COMPOSE'
        version: "3.8"
        services:
          mitosis-oasis:
            image: ghcr.io/anbangr/mitosis-oasis:latest
            container_name: mitosis-oasis
            restart: unless-stopped
            ports:
              - "8100:8000"
            volumes:
              - mitosis-data:/app/data
            environment:
              - OASIS_DB_PATH=/app/data/governance.db
            healthcheck:
              test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
              interval: 30s
              timeout: 5s
              retries: 3
              start_period: 10s
        volumes:
          mitosis-data:
        COMPOSE
        docker compose up -d --force-recreate
      health-url: "http://157.245.48.133:8100/api/health"
    secrets:
      DROPLET_IP: ${{ secrets.DROPLET_IP }}
      DROPLET_USER: ${{ secrets.DROPLET_USER }}
      DROPLET_SSH_KEY: ${{ secrets.DROPLET_SSH_KEY }}
