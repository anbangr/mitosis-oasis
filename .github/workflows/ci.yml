name: CI

# Inlined CI pipeline for mitosis-oasis.
#
# This repo is public; mitosis-cicd (which hosts the reusable workflows for the
# other mitosis projects) is private. GitHub Actions refuses to resolve a
# reusable workflow from a private caller — making the cross-org workflow_call
# unusable here. Until that changes, the python-ci / docker-ghcr / deploy-ssh
# bodies are inlined below. Keep in sync manually with mitosis-cicd if those
# evolve.
#
# All jobs run on the dedicated CI droplet's `ci-oasis` runner (4 vCPU /
# 8 GB / 160 GB), which is registered against this repo with both `build`
# and `test` labels. Self-hosted to avoid GitHub Actions billed minutes.

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Python CI (pytest with system deps) ────────────────────────────────────
  python-ci:
    name: Python 3.10
    runs-on: [self-hosted, build]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcairo2-dev pkg-config libigraph-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run pytest
        run: pytest --tb=short -v

  # ── Docker build + push to GHCR ───────────────────────────────────────────
  docker:
    name: Build & push Docker image
    needs: [python-ci]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: [self-hosted, build]
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ghcr.io/anbangr/mitosis-oasis:latest
            ghcr.io/anbangr/mitosis-oasis:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy to droplet ──────────────────────────────────────────────────────
  deploy:
    name: Deploy to droplet
    needs: [docker]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: [self-hosted, build]
    timeout-minutes: 10
    concurrency:
      # Production deploys must NEVER be cancelled mid-flight: a SIGTERM after
      # `docker pull` but before `docker compose up` would leave the droplet in
      # an inconsistent state. Queue instead.
      group: deploy-mitosis-oasis
      cancel-in-progress: false
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          DEPLOY_IMAGE: ghcr.io/anbangr/mitosis-oasis
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          envs: DEPLOY_IMAGE
          script: |
            set -euo pipefail

            docker pull "${DEPLOY_IMAGE}:latest"

            mkdir -p /root/mitosis-oasis
            cd /root/mitosis-oasis
            cat > docker-compose.yml << 'COMPOSE'
            version: "3.8"
            services:
              mitosis-oasis:
                image: ghcr.io/anbangr/mitosis-oasis:latest
                container_name: mitosis-oasis
                restart: unless-stopped
                ports:
                  - "8100:8000"
                volumes:
                  - mitosis-data:/app/data
                environment:
                  - OASIS_DB_PATH=/app/data/governance.db
                healthcheck:
                  test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
                  interval: 30s
                  timeout: 5s
                  retries: 3
                  start_period: 10s
            volumes:
              mitosis-data:
            COMPOSE
            docker compose up -d --force-recreate

      - name: Health check
        run: |
          echo "Waiting for health endpoint..."
          for i in $(seq 1 20); do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "http://157.245.48.133:8100/api/health" 2>/dev/null || echo "000")
            if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 500 ]; then
              echo "App is up (HTTP $HTTP_CODE)"
              exit 0
            fi
            sleep 3
          done
          echo "Health check failed after 60s"
          exit 1
