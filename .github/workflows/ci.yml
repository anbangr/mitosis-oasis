name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcairo2-dev pkg-config libigraph-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run tests
        run: python -m pytest -v --tb=short

  docker:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/anbangr/metosis-oasis:latest
            ghcr.io/anbangr/metosis-oasis:${{ github.sha }}

  deploy:
    needs: docker
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to droplet
        uses: appleboy/ssh-action@v1
        with:
          host: 157.245.48.133
          username: root
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script: |
            mkdir -p /root/metosis-oasis
            cd /root/metosis-oasis

            # Write docker-compose.yml
            cat > docker-compose.yml << 'COMPOSE'
            version: "3.8"
            services:
              metosis-oasis:
                image: ghcr.io/anbangr/metosis-oasis:latest
                container_name: metosis-oasis
                restart: unless-stopped
                ports:
                  - "8100:8000"
                volumes:
                  - metosis-data:/app/data
                environment:
                  - OASIS_DB_PATH=/app/data/governance.db
                healthcheck:
                  test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
                  interval: 30s
                  timeout: 5s
                  retries: 3
                  start_period: 10s
            volumes:
              metosis-data:
            COMPOSE

            # Pull and restart
            docker pull ghcr.io/anbangr/metosis-oasis:latest
            docker compose up -d --force-recreate

            # Wait for health check
            sleep 5
            curl -sf http://localhost:8100/api/health || echo "Health check pending..."
