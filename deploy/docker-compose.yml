version: "3.8"

services:
  mitosis-oasis:
    image: ghcr.io/anbangr/mitosis-oasis:latest
    container_name: mitosis-oasis
    restart: unless-stopped
    ports:
      - "8100:8000"
    volumes:
      - mitosis-data:/app/data
    environment:
      - OASIS_DB_PATH=/app/data/governance.db
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  agent-fleet:
    image: ghcr.io/anbangr/mitosis-prototype:latest
    container_name: agent-fleet
    depends_on:
      mitosis-oasis:
        condition: service_healthy
    environment:
      - OASIS_BASE_URL=http://mitosis-oasis:8000
    volumes:
      - agent-results:/app/experiments/results

volumes:
  mitosis-data:
  agent-results:
